management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
#spring.cloud.config.enabled=false
management.health.circuitbreakers.enabled=true

# Critical: This must be true for each instance or the default config
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
# Trace every single request (1.0 = 100%)
management.tracing.sampling.probability=1.0

# The standard Zipkin endpoint for Spring Boot 3
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Expose tracing and health via Actuator
management.endpoints.web.exposure.include=health,metrics,tracing
