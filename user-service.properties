server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/Omni_User?createDatabaseIfNotExist=true
spring.datasource.username=root
#spring.datasource.password=Murali#13
spring.datasource.password=${DB_PASSWORD}


spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
cors.allowed.origins=https://localhost:3000,http://localhost:4200


#jwt.secret=PowerStartPawanKalyansTheyCallHimOg
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
